<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verde Vigilante — Fiscalização Ambiental Colaborativa</title>
    <meta
      name="description"
      content="Aplicativo mobile para fiscais de campo reportarem desmatamento, avistamentos de fauna e crimes contra a vida silvestre, com fotos geotagueadas e recompensas em tokens."
    />
    <meta name="author" content="Verde Vigilante" />

    <meta property="og:title" content="Verde Vigilante — Fiscalização Ambiental Colaborativa" />
    <meta
      property="og:description"
      content="Reporte desmatamento e tráfico de animais silvestres com fotos geotagueadas e ganhe tokens por contribuições validadas."
    />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />

    <!-- Single Page Apps for GitHub Pages: decodes the ?/ redirect from 404.html -->
    <script>
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function (s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
